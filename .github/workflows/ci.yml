name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, test, lint, coverage (GHC 9.12.2)
    runs-on: ubuntu-latest
    container: haskell:9.12.2

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y pkg-config libsdl2-dev libsndfile1-dev libasound2-dev libudev-dev libusb-1.0-0-dev libgl1-mesa-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev libxss-dev libgles2-mesa-dev

      - name: Show cabal paths
        run: cabal path

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            /github/home/.local/state/cabal
            /github/home/.cache/cabal/packages
          key: ${{ runner.os }}-ghc-9.12.2-store-${{ hashFiles('cabal.project.freeze', 'funktor.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.12.2-store-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-ghc-9.12.2-dist-${{ hashFiles('cabal.project.freeze', 'funktor.cabal', 'src/**/*.hs', 'test/**/*.hs') }}

      - name: Update cabal index
        run: cabal update

      - name: Build (warnings → errors)
        run: cabal build all --enable-optimization=2 --ghc-options=-Werror

      - name: Test with coverage
        run: cabal test --enable-coverage --test-show-details=direct

      - name: Coverage threshold check
        run: bash scripts/check-coverage.sh

      - name: Set up hlint
        uses: haskell-actions/hlint-setup@v2

      - name: Run hlint
        run: hlint src test app

      - name: Run fourmolu
        uses: haskell-actions/run-fourmolu@v11
        with:
          version: "0.19.0.1"
          pattern: |
            src/**/*.hs
            app/**/*.hs
            test/**/*.hs
